<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>xalx.net</title>
    <script src="http://codef.santo.fr/codef/codef_core.js"></script>
    <script src="xalx.js"></script>

    <style>
      @font-face {
        font-family: "unscii16";
        src: url("unscii-16-full.ttf") format("truetype");
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        background-color: #6C5EB5;
      }

      body {
        font-family: "unscii16", monospace;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #screen {
        background-color: #40318D;
        color: #6C5EB5;
        padding: 1.5em 2ch;
        line-height: 1.2;
        text-transform: uppercase;
        text-align: center;
        min-width: 80%;
      }

      #text {
        text-align: left;
        display: inline-block;
      }

      a {
        color: #6C5EB5;
        text-decoration: none;
      }

      a:hover {
        color: #fff;
      }

      /* Blinking cursor */
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }

      #cursor {
        display: inline-block;
        width: 1ch;
        height: 1.2em;
        background-color: #6C5EB5;
        vertical-align: bottom;
        animation: blink 1s step-end infinite;
      }

      #main {
        margin-top: 1.5em;
        display: flex;
        justify-content: center;
      }

      #main canvas {
        max-width: 100%;
        height: auto;
      }

      #links {
        margin-top: 1.5em;
      }
    </style>

  </head>
  <body onLoad="init();">
    <div id="screen">
      <div id="text">
        **** COMMODORE 64 BASIC V2 ****<br><br>
        64K RAM SYSTEM  38911 BASIC BYTES FREE<br><br>
        READY.<br>
        <span id="cursor"></span>
      </div>

      <div id="main"></div>

      <div id="links">
        [<a href="https://github.com/alx242">G</a>]-O-[<a href="https://www.linkedin.com/in/alx242/">L</a>]-O-[<a href="https://twitter.com/xalxor">T</a>]-O-[<a href="https://www.instagram.com/alx242/">I</a>]-O-[<a href="https://soundcloud.com/alx242">S</a>]-O-[<a href="mailto:alex@xalx.net">M</a>]
      </div>

    </div>
  </body>
</html>
